version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: employee_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: employee_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/employee-management
      - JWT_SECRET=supersecretjwtkey123
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: employee_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
